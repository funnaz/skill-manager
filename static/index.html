<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skill 管家</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: rgba(18, 26, 47, 0.82);
      --panel-solid: #121a2f;
      --panel-2: #18233d;
      --panel-hover: #1c2848;
      --border: rgba(36, 48, 79, 0.75);
      --border-light: rgba(91, 140, 255, 0.22);
      --text: #e8edf8;
      --muted: #8b97b8;
      --accent: #5b8cff;
      --accent-2: #7c5cff;
      --accent-glow: rgba(91, 140, 255, 0.35);
      --ok: #34d399;
      --warn: #fbbf24;
      --danger: #fb7185;
      --shadow: 0 24px 64px rgba(0, 0, 0, 0.42);
      --shadow-sm: 0 8px 28px rgba(0, 0, 0, 0.28);
      --radius: 18px;
      --radius-sm: 12px;
      --radius-xs: 8px;
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      background:
        radial-gradient(ellipse 80% 50% at 10% -10%, rgba(91, 140, 255, 0.22), transparent 50%),
        radial-gradient(ellipse 60% 40% at 95% 0%, rgba(124, 92, 255, 0.18), transparent 45%),
        radial-gradient(ellipse 50% 30% at 50% 100%, rgba(91, 140, 255, 0.08), transparent 50%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(91, 140, 255, 0.25); border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(91, 140, 255, 0.45); }

    .app { max-width: 1480px; margin: 0 auto; padding: 32px 28px 48px; }

    /* ── Hero ── */
    .hero {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 28px;
      margin-bottom: 28px;
      padding: 28px 32px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      backdrop-filter: blur(20px);
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(91, 140, 255, 0.5), rgba(124, 92, 255, 0.5), transparent);
    }
    .hero-brand { display: flex; gap: 18px; align-items: flex-start; }
    .hero-icon {
      width: 52px; height: 52px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      box-shadow: 0 8px 24px var(--accent-glow);
    }
    .hero h1 {
      margin: 0 0 6px;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #fff 30%, #a8c4ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-desc { margin: 0; color: var(--muted); max-width: 640px; line-height: 1.7; font-size: 14px; }
    .hero-meta { display: flex; align-items: center; gap: 12px; margin-top: 12px; flex-wrap: wrap; }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 12px; border-radius: 999px;
      font-size: 12px; font-weight: 500;
      background: rgba(52, 211, 153, 0.12);
      border: 1px solid rgba(52, 211, 153, 0.3);
      color: #6ee7b7;
    }
    .hero-badge::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--ok); box-shadow: 0 0 8px var(--ok); }
    .github-link {
      color: #9ec1ff; text-decoration: none; font-size: 13px;
      display: inline-flex; align-items: center; gap: 5px;
      transition: color var(--transition);
    }
    .github-link:hover { color: #c7dcff; text-decoration: underline; }

    /* ── Buttons ── */
    .actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; align-items: center; }
    button, .chip, select, textarea, input[type=text] {
      border: 1px solid var(--border);
      background: var(--panel-solid);
      color: var(--text);
      border-radius: var(--radius-sm);
      padding: 9px 14px;
      font-size: 13px;
      font-family: inherit;
      transition: all var(--transition);
      outline: none;
    }
    button {
      cursor: pointer;
      border-radius: 999px;
      padding: 9px 18px;
      font-weight: 500;
      white-space: nowrap;
    }
    button:hover:not(:disabled) {
      background: var(--panel-hover);
      border-color: var(--border-light);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
    }
    button:active:not(:disabled) { transform: translateY(0); }
    button.primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border: none;
      font-weight: 600;
      color: #fff;
      box-shadow: 0 4px 20px var(--accent-glow);
    }
    button.primary:hover:not(:disabled) {
      box-shadow: 0 6px 28px rgba(91, 140, 255, 0.45);
      background: linear-gradient(135deg, #6b9aff, #8b6dff);
    }
    button.danger {
      background: rgba(251, 113, 133, 0.1);
      border-color: rgba(251, 113, 133, 0.35);
      color: #fda4af;
    }
    button.danger:hover:not(:disabled) {
      background: rgba(251, 113, 133, 0.2);
      border-color: rgba(251, 113, 133, 0.55);
    }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── Stats ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 20px;
    }
    .stat {
      padding: 20px 22px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      backdrop-filter: blur(12px);
      position: relative;
      overflow: hidden;
      transition: transform var(--transition), border-color var(--transition);
    }
    .stat:hover { transform: translateY(-2px); border-color: var(--border-light); }
    .stat::after {
      content: "";
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: var(--stat-accent, var(--accent));
      opacity: 0.6;
    }
    .stat-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .stat .label { color: var(--muted); font-size: 12px; font-weight: 500; letter-spacing: 0.04em; }
    .stat-icon {
      width: 32px; height: 32px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      background: rgba(91, 140, 255, 0.12);
      border: 1px solid rgba(91, 140, 255, 0.2);
    }
    .stat .value { font-size: 32px; font-weight: 700; letter-spacing: -0.03em; line-height: 1; }

    /* ── Layout ── */
    .layout {
      display: grid;
      grid-template-columns: 300px 1fr 400px;
      gap: 16px;
      min-height: 74vh;
    }
    .panel-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin: 0 0 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .panel-title::after {
      content: "";
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);
    }
    .stat, .agent-card, .skill-card, .detail, .filters, .list-panel, .modal-card, .detail-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      backdrop-filter: blur(12px);
    }
    .filters, .list-panel, .detail { padding: 20px; min-height: 0; }

    /* ── Agent cards ── */
    .agent-grid { display: grid; gap: 8px; margin-bottom: 22px; }
    .agent-card {
      padding: 14px 16px;
      transition: border-color var(--transition), background var(--transition);
      cursor: default;
    }
    .agent-card:hover { border-color: var(--border-light); background: rgba(24, 35, 61, 0.6); }
    .agent-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .agent-top > div:first-child { font-weight: 600; font-size: 14px; }
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 999px;
      font-size: 11px; font-weight: 600;
      border: 1px solid var(--border);
      background: var(--panel-2);
    }
    .badge::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
    .agent-meta { color: var(--muted); font-size: 11px; line-height: 1.6; word-break: break-all; }
    .agent-meta div { padding: 2px 0; opacity: 0.85; }

    /* ── Search & chips ── */
    .search-wrap { position: relative; margin-bottom: 14px; }
    .search-wrap::before {
      content: "⌕";
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--muted); font-size: 16px; pointer-events: none;
    }
    .search {
      width: 100%;
      padding-left: 38px;
      background: rgba(13, 20, 40, 0.6);
      border-color: var(--border);
    }
    .search:focus { border-color: rgba(91, 140, 255, 0.55); box-shadow: 0 0 0 3px rgba(91, 140, 255, 0.12); }
    .chip-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .chip {
      cursor: pointer;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 12px;
      color: var(--muted);
      background: rgba(13, 20, 40, 0.5);
    }
    .chip:hover { color: var(--text); border-color: var(--border-light); }
    .chip.active {
      background: linear-gradient(135deg, rgba(91, 140, 255, 0.2), rgba(124, 92, 255, 0.15));
      border-color: rgba(91, 140, 255, 0.5);
      color: #dbe7ff;
      font-weight: 500;
    }

    /* ── Skill list ── */
    .skill-list { overflow: auto; max-height: calc(74vh - 48px); display: grid; gap: 8px; padding-right: 4px; }
    .skill-card {
      padding: 14px 16px 14px 18px;
      cursor: pointer;
      transition: all var(--transition);
      position: relative;
      border-left: 3px solid transparent;
    }
    .skill-card.has-pick { padding-left: 44px; }
    .skill-card .pick { position: absolute; top: 14px; left: 14px; accent-color: var(--accent); }
    .skill-card:hover { border-color: var(--border-light); background: rgba(24, 35, 61, 0.55); transform: translateX(2px); }
    .skill-card.active {
      border-color: rgba(91, 140, 255, 0.55);
      border-left-color: var(--accent);
      background: linear-gradient(135deg, rgba(91, 140, 255, 0.1), rgba(124, 92, 255, 0.06));
      box-shadow: 0 4px 20px rgba(91, 140, 255, 0.12);
    }
    .skill-title { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 6px; align-items: center; }
    .skill-title h3 { margin: 0; font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
    .skill-desc {
      color: var(--muted); font-size: 12px; line-height: 1.55; margin-bottom: 10px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .tag-row { display: flex; flex-wrap: wrap; gap: 5px; }
    .tag {
      font-size: 10px; padding: 3px 8px; border-radius: 999px;
      background: rgba(24, 35, 61, 0.8);
      border: 1px solid var(--border);
      color: var(--muted);
      font-weight: 500;
      letter-spacing: 0.02em;
    }
    .tag.update {
      background: rgba(251, 191, 36, 0.12);
      border-color: rgba(251, 191, 36, 0.4);
      color: #fde68a;
    }
    .tag.accent {
      background: rgba(91, 140, 255, 0.12);
      border-color: rgba(91, 140, 255, 0.35);
      color: #a8c4ff;
    }
    .tag.danger {
      background: rgba(251, 113, 133, 0.1);
      border-color: rgba(251, 113, 133, 0.35);
      color: #fda4af;
    }

    /* ── Detail panel ── */
    .detail { overflow: auto; max-height: 74vh; padding: 24px !important; }
    .detail-header { margin-bottom: 20px; }
    .detail h2 { margin: 0 0 6px; font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
    .detail .sub { font-size: 13px; margin-bottom: 0; color: var(--muted); line-height: 1.6; }
    .detail-actions { display: flex; gap: 8px; margin: 18px 0; flex-wrap: wrap; }
    .detail-card { padding: 16px 18px; margin-bottom: 12px; }
    .detail-section { margin-bottom: 0; }
    .detail-section h4 {
      margin: 0 0 12px;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
    }
    .kv { display: grid; gap: 0; }
    .kv div {
      display: grid; grid-template-columns: 100px 1fr; gap: 12px;
      font-size: 13px; padding: 8px 0;
      border-bottom: 1px solid rgba(36, 48, 79, 0.4);
    }
    .kv div:last-child { border-bottom: none; }
    .kv span:first-child { color: var(--muted); font-size: 12px; }
    .kv span:last-child { word-break: break-all; font-size: 12px; }
    .markdown {
      white-space: pre-wrap;
      font-family: "Cascadia Code", "Fira Code", Consolas, monospace;
      font-size: 12px; line-height: 1.65;
      background: rgba(8, 12, 28, 0.8);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px;
      overflow: auto;
      max-height: 340px;
      color: #c8d4f0;
    }

    /* ── Empty & loading ── */
    .empty {
      color: var(--muted);
      padding: 40px 20px;
      text-align: center;
      font-size: 13px;
      line-height: 1.7;
    }
    .empty::before { content: "◌"; display: block; font-size: 28px; margin-bottom: 10px; opacity: 0.4; }
    .loading { opacity: 0.55; pointer-events: none; }

    /* ── Modal ── */
    .modal {
      position: fixed; inset: 0;
      background: rgba(3, 7, 18, 0.75);
      backdrop-filter: blur(8px);
      display: none; align-items: center; justify-content: center;
      padding: 24px; z-index: 20;
      animation: fadeIn 0.2s ease;
    }
    .modal.open { display: flex; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(16px) scale(0.98); } to { opacity: 1; transform: none; } }
    .modal-card {
      width: min(540px, 100%);
      padding: 28px;
      animation: slideUp 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }
    .modal-card::before {
      content: "";
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
    }
    .modal-card h3 { margin: 0 0 6px; font-size: 20px; font-weight: 700; }
    .modal-card p { color: var(--muted); font-size: 13px; line-height: 1.65; margin: 0; }
    .form-grid { display: grid; gap: 14px; margin: 20px 0; }
    .form-grid label { display: grid; gap: 7px; font-size: 12px; color: var(--muted); font-weight: 500; }
    .form-grid input, .form-grid select {
      background: rgba(8, 12, 28, 0.7);
    }
    .form-grid input:focus, .form-grid select:focus {
      border-color: rgba(91, 140, 255, 0.55);
      box-shadow: 0 0 0 3px rgba(91, 140, 255, 0.1);
    }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 4px; }
    .modal-card.wide { width: min(900px, 100%); max-height: 86vh; overflow: auto; }

    /* ── Update report ── */
    .report-summary {
      display: flex; gap: 10px; flex-wrap: wrap;
      margin: 16px 0 20px;
    }
    .report-pill {
      display: flex; flex-direction: column; gap: 2px;
      padding: 12px 18px; border-radius: var(--radius-sm);
      background: rgba(13, 20, 40, 0.6);
      border: 1px solid var(--border);
      min-width: 110px;
    }
    .report-pill .num { font-size: 24px; font-weight: 700; letter-spacing: -0.03em; line-height: 1; }
    .report-pill .lbl { font-size: 11px; color: var(--muted); }
    .report-pill.official .num { color: var(--accent); }
    .report-pill.local .num { color: var(--warn); }
    .report-pill.merge .num { color: var(--accent-2); }

    .update-section {
      margin: 0 0 14px;
      padding: 16px 18px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: rgba(13, 20, 40, 0.45);
    }
    .update-section:last-child { margin-bottom: 0; }
    .update-section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
    .update-section h4 { margin: 0; font-size: 14px; font-weight: 600; }
    .update-section-count {
      font-size: 11px; padding: 2px 8px; border-radius: 999px;
      background: rgba(91, 140, 255, 0.15);
      border: 1px solid rgba(91, 140, 255, 0.3);
      color: #a8c4ff;
      font-weight: 600;
    }
    .update-section > p { color: var(--muted); font-size: 12px; margin: 0 0 12px; line-height: 1.55; }
    .update-item {
      padding: 14px 16px;
      border: 1px solid rgba(36, 48, 79, 0.5);
      border-radius: var(--radius-sm);
      background: rgba(18, 26, 47, 0.5);
      margin-top: 10px;
      transition: border-color var(--transition);
    }
    .update-item:hover { border-color: var(--border-light); }
    .update-item-top { display: flex; justify-content: space-between; gap: 12px; align-items: center; flex-wrap: wrap; }
    .update-item-top strong { font-size: 14px; font-weight: 600; }
    .change-list { margin: 8px 0 0; padding-left: 16px; color: var(--muted); font-size: 12px; line-height: 1.7; }
    .change-list li { margin-bottom: 2px; }
    .mini-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
    .mini-actions button { font-size: 12px; padding: 7px 14px; }

    /* ── Toast ── */
    .toast {
      position: fixed; right: 24px; bottom: 24px;
      background: var(--panel-solid);
      border: 1px solid var(--border-light);
      padding: 14px 20px;
      border-radius: var(--radius-sm);
      display: none; z-index: 30;
      font-size: 13px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      animation: slideUp 0.3s ease;
      max-width: 360px;
    }
    .toast.show { display: block; }

    code {
      background: rgba(91, 140, 255, 0.1);
      border: 1px solid rgba(91, 140, 255, 0.2);
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 12px;
      color: #a8c4ff;
    }

    @media (max-width: 1180px) {
      .layout, .stats { grid-template-columns: 1fr; }
      .skill-list, .detail { max-height: none; }
      .hero { flex-direction: column; }
      .actions { justify-content: flex-start; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="hero">
      <div class="hero-brand">
        <div class="hero-icon">⚡</div>
        <div>
          <h1>Skill 管家</h1>
          <p class="hero-desc">扫描、安装、创建、禁用和删除本机 Agent Skills。支持 Grok Build、Cursor、OpenAI Codex，以及共享的 <code>.agents/skills</code> 目录。</p>
          <div class="hero-meta">
            <span class="hero-badge">运行中</span>
            <a class="github-link" id="githubLink" href="#" target="_blank" rel="noreferrer">↗ GitHub 仓库</a>
          </div>
        </div>
      </div>
      <div class="actions">
        <button id="checkUpdatesBtn">检查更新</button>
        <button id="exportBtn">导出报告</button>
        <button id="batchDeleteBtn" class="danger">批量删除</button>
        <button id="createBtn">新建 Skill</button>
        <button id="installBtn">安装 Skill</button>
        <button id="refreshBtn" class="primary">重新扫描</button>
      </div>
    </div>
    <div class="stats" id="stats"></div>
    <div class="layout">
      <section class="filters">
        <p class="panel-title">Agent 概览</p>
        <div class="agent-grid" id="agentGrid"></div>
        <p class="panel-title">筛选</p>
        <div class="search-wrap">
          <input class="search" id="searchInput" placeholder="搜索名称、描述、路径..." />
        </div>
        <div class="chip-row" id="agentFilters"></div>
        <div class="chip-row" id="categoryFilters"></div>
      </section>
      <section class="list-panel">
        <p class="panel-title">Skill 列表 <span id="listCount" style="letter-spacing:0;text-transform:none;font-size:12px;color:var(--accent)"></span></p>
        <div class="skill-list" id="skillList"></div>
      </section>
      <section class="detail" id="detailPanel"><div class="empty">选择一个 Skill 查看详情</div></section>
    </div>
  </div>

  <div class="modal" id="createModal">
    <div class="modal-card">
      <h3>新建 Skill</h3>
      <p>在指定 scope 下创建标准 SKILL.md 模板。</p>
      <div class="form-grid">
        <label>名称<input id="createName" placeholder="my-skill" /></label>
        <label>描述<input id="createDesc" placeholder="这个 skill 做什么、何时触发" /></label>
        <label>安装位置
          <select id="createScope">
            <option value="grok">Grok 用户 (~/.grok/skills)</option>
            <option value="agents">共享 Agents (~/.agents/skills)</option>
            <option value="codex">Codex (~/.codex/skills)</option>
            <option value="cursor">Cursor (~/.cursor/skills)</option>
          </select>
        </label>
      </div>
      <div class="modal-actions">
        <button data-close="createModal">取消</button>
        <button class="primary" id="createSubmit">创建</button>
      </div>
    </div>
  </div>

  <div class="modal" id="installModal">
    <div class="modal-card">
      <h3>安装 Skill</h3>
      <p>从本地目录或 GitHub 仓库安装。仓库中需包含 SKILL.md。</p>
      <div class="form-grid">
        <label>名称（可选）<input id="installName" placeholder="留空则读取 SKILL.md" /></label>
        <label>安装位置
          <select id="installScope">
            <option value="grok">Grok 用户 (~/.grok/skills)</option>
            <option value="agents">共享 Agents (~/.agents/skills)</option>
            <option value="codex">Codex (~/.codex/skills)</option>
            <option value="cursor">Cursor (~/.cursor/skills)</option>
          </select>
        </label>
        <label>本地目录<input id="installPath" placeholder="C:\path\to\skill-folder" /></label>
        <label>GitHub 仓库<input id="installGit" placeholder="https://github.com/funnaz/skill-manager.git" /></label>
        <label>仓库内子路径（可选）<input id="installSubpath" placeholder="skills/my-skill" /></label>
      </div>
      <div class="modal-actions">
        <button data-close="installModal">取消</button>
        <button class="primary" id="installSubmit">安装</button>
      </div>
    </div>
  </div>

  <div class="modal" id="updateReportModal">
    <div class="modal-card wide">
      <h3>更新检查报告</h3>
      <p id="updateReportIntro">汇总官方更新、本地改动，以及需要整合的 skill。</p>
      <div id="updateReportSummary"></div>
      <div id="updateReportBody"></div>
      <div class="modal-actions">
        <button data-close="updateReportModal">关闭</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const state = { data: null, selectedId: null, selectedBatch: new Set(), search: "", agent: "all", category: "all", withUpdates: false };
    const $ = (id) => document.getElementById(id);
    const toast = (msg) => { const el = $("toast"); el.textContent = msg; el.classList.add("show"); setTimeout(() => el.classList.remove("show"), 3200); };
    const escapeHtml = (t) => String(t ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;");
    const openModal = (id) => $(id).classList.add("open");
    const closeModal = (id) => $(id).classList.remove("open");

    const STAT_META = [
      ["Skill 总数", "totals.skills", "📦", "#5b8cff"],
      ["可更新", "updates", "↑", "#fbbf24"],
      ["多 Agent 共享", "totals.shared_skills", "🔗", "#7c5cff"],
      ["已禁用", "totals.disabled", "⊘", "#fb7185"],
    ];

    async function api(path, method = "GET", body) {
      const res = await fetch(path, { method, headers: body ? { "Content-Type": "application/json" } : {}, body: body ? JSON.stringify(body) : undefined });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.detail || "请求失败");
      return data;
    }

    function renderStats() {
      const { totals } = state.data;
      const updateCount = state.data.updates?.updates_available_count ?? state.data.skills.filter(s => s.has_update).length;
      const values = { "totals.skills": totals.skills, "totals.shared_skills": totals.shared_skills, "totals.disabled": totals.disabled, updates: updateCount };
      $("stats").innerHTML = STAT_META.map(([label, key, icon, color]) => `
        <div class="stat" style="--stat-accent:${color}">
          <div class="stat-top">
            <span class="label">${label}</span>
            <span class="stat-icon">${icon}</span>
          </div>
          <div class="value">${values[key]}</div>
        </div>`).join("");
      if (state.data.project?.github_url) {
        const link = $("githubLink");
        link.href = state.data.project.github_url;
        link.textContent = `↗ ${state.data.project.github_url.replace("https://github.com/", "")}`;
      }
      document.title = `Skill 管家 · ${totals.skills}`;
    }

    function renderAgents() {
      $("agentGrid").innerHTML = state.data.agents.map(a => `
        <div class="agent-card">
          <div class="agent-top">
            <div>${escapeHtml(a.label)}</div>
            <span class="badge" style="color:${a.color}">${a.installed}</span>
          </div>
          <div class="agent-meta">${a.configured ? a.roots.map(r => `<div>${escapeHtml(r)}</div>`).join("") : "未检测到配置目录"}</div>
        </div>`).join("");
      $("agentFilters").innerHTML = [`<button class="chip ${state.agent==="all"?"active":""}" data-agent="all">全部</button>`,
        ...state.data.agents.map(a => `<button class="chip ${state.agent===a.id?"active":""}" data-agent="${a.id}">${escapeHtml(a.short)} · ${a.installed}</button>`)].join("");
    }

    function renderCategoryFilters() {
      $("categoryFilters").innerHTML = [`<button class="chip ${state.category==="all"?"active":""}" data-category="all">全部分类</button>`,
        ...state.data.categories.map(c => `<button class="chip ${state.category===c.id?"active":""}" data-category="${c.id}">${escapeHtml(c.label)} ${c.count}</button>`)].join("");
    }

    function skillTags(s) {
      const tags = s.agent_labels.map(l => `<span class="tag accent">${escapeHtml(l)}</span>`).join("");
      const extra = [
        s.has_update ? '<span class="tag update">有新版本</span>' : "",
        s.local_version ? `<span class="tag">v${escapeHtml(s.local_version)}</span>` : "",
        s.disabled ? '<span class="tag danger">已禁用</span>' : "",
        s.deletable ? "" : '<span class="tag">受保护</span>',
      ].join("");
      return tags + extra;
    }

    function renderSkillList() {
      const skills = filteredSkills();
      $("listCount").textContent = skills.length ? `${skills.length}` : "0";
      $("skillList").innerHTML = skills.length ? skills.map(s => `
        <article class="skill-card has-pick ${state.selectedId===s.id?"active":""}" data-id="${escapeHtml(s.id)}">
          ${s.deletable ? `<input class="pick" type="checkbox" data-pick="${escapeHtml(s.id)}" ${state.selectedBatch.has(s.id)?"checked":""} />` : ""}
          <div class="skill-title">
            <h3>${escapeHtml(s.name)}</h3>
            <span class="tag">${escapeHtml(s.category)}</span>
          </div>
          <div class="skill-desc">${escapeHtml(s.description || "无描述")}</div>
          <div class="tag-row">${skillTags(s)}</div>
        </article>`).join("") : `<div class="empty">没有匹配的 Skill</div>`;
    }

    function filteredSkills() {
      const q = state.search.trim().toLowerCase();
      return state.data.skills.filter(s => {
        if (state.agent !== "all" && !s.agents.includes(state.agent)) return false;
        if (state.category !== "all" && s.category !== state.category) return false;
        if (!q) return true;
        return [s.name,s.folder_name,s.description,s.path,s.resolved_path,s.agent_labels.join(" "),s.category].join(" ").toLowerCase().includes(q);
      });
    }

    async function renderDetail(skill) {
      if (!skill) { $("detailPanel").innerHTML = `<div class="empty">选择一个 Skill 查看详情</div>`; return; }
      $("detailPanel").innerHTML = `<div class="empty">加载内容中...</div>`;
      const content = await api(`/api/skill?path=${encodeURIComponent(skill.resolved_path)}`);
      $("detailPanel").innerHTML = `
        <div class="detail-header">
          <h2>${escapeHtml(skill.name)}</h2>
          <div class="sub">${escapeHtml(skill.description || "无描述")}</div>
        </div>
        <div class="detail-actions">
          ${skill.deletable ? `<button class="danger" id="deleteSelectedBtn">删除</button>` : `<button disabled title="${escapeHtml(skill.delete_reason)}">不可删除</button>`}
          ${skill.disabled ? `<button id="enableSelectedBtn">启用</button>` : `<button id="disableSelectedBtn">禁用</button>`}
          ${skill.needs_merge ? `<button class="primary" id="mergeSelectedBtn">整合更新</button>` : ""}
          ${skill.has_update && !skill.user_edited ? `<button class="primary" id="upgradeSelectedBtn">直接升级</button>` : ""}
          ${skill.has_update && skill.user_edited && !skill.needs_merge ? `<button id="upgradeSelectedBtn">覆盖升级</button>` : ""}
        </div>
        <div class="detail-card">
          <div class="detail-section"><h4>安装到哪些 Agent</h4>
            <div class="tag-row">${skill.agent_labels.length ? skill.agent_labels.map(l => `<span class="tag accent">${escapeHtml(l)}</span>`).join("") : `<span class="tag">仅磁盘存在</span>`}</div>
          </div>
        </div>
        <div class="detail-card">
          <div class="detail-section"><h4>元信息</h4><div class="kv">
            <div><span>文件夹</span><span>${escapeHtml(skill.folder_name)}</span></div>
            <div><span>分类</span><span>${escapeHtml(skill.category)}</span></div>
            <div><span>路径</span><span>${escapeHtml(skill.resolved_path)}</span></div>
            ${skill.source ? `<div><span>来源</span><span>${escapeHtml(skill.source)}</span></div>` : ""}
            <div><span>本地版本</span><span>${escapeHtml(skill.local_version || "-")}</span></div>
            <div><span>远程版本</span><span>${escapeHtml(skill.remote_version || "-")}</span></div>
            <div><span>更新状态</span><span>${escapeHtml(skill.update_status || "未检查")}</span></div>
            <div><span>可删除</span><span>${skill.deletable ? "是" : escapeHtml(skill.delete_reason)}</span></div>
          </div></div>
        </div>
        ${renderLocalChanges(skill)}
        <div class="detail-card">
          <div class="detail-section"><h4>SKILL.md</h4><pre class="markdown">${escapeHtml(content.raw || "")}</pre></div>
        </div>`;
      const delBtn = $("deleteSelectedBtn");
      if (delBtn) delBtn.onclick = () => deleteSkill(skill);
      const disableBtn = $("disableSelectedBtn");
      if (disableBtn) disableBtn.onclick = () => toggleSkill(skill, "disable");
      const enableBtn = $("enableSelectedBtn");
      if (enableBtn) enableBtn.onclick = () => toggleSkill(skill, "enable");
      const upgradeBtn = $("upgradeSelectedBtn");
      if (upgradeBtn) upgradeBtn.onclick = () => upgradeSkill(skill);
      const mergeBtn = $("mergeSelectedBtn");
      if (mergeBtn) mergeBtn.onclick = () => mergeSkill(skill);
    }

    function renderLocalChanges(skill) {
      const lc = skill.local_changes;
      const diff = skill.diff;
      if (!lc && !diff) return "";
      const added = lc?.added_files || diff?.added_locally || [];
      const modified = lc?.modified_files || (diff?.modified || []).map(i => i.path);
      const missing = diff?.missing_locally || [];
      if (!added.length && !modified.length && !missing.length) return "";
      return `<div class="detail-card"><div class="detail-section"><h4>本地 / 官方差异</h4><ul class="change-list">
        ${added.map(f => `<li>本地新增：${escapeHtml(f)}</li>`).join("")}
        ${modified.map(f => `<li>双方修改：${escapeHtml(f)}</li>`).join("")}
        ${missing.map(f => `<li>官方新增：${escapeHtml(f)}</li>`).join("")}
      </ul><div class="sub" style="margin-top:8px">${escapeHtml(lc?.summary || diff?.summary || "")}</div></div></div>`;
    }

    function renderUpdateItem(item, actions = true) {
      const real = item.local_changes?.real_files || [];
      const modified = item.local_changes?.modified_files || (item.diff?.modified || []).map(i => i.path);
      const missing = item.diff?.missing_locally || [];
      const notes = item.local_changes?.notes || [];
      const label = item.change_label || item.local_changes?.summary || "";
      const versionText = item.local_version || item.remote_version
        ? `${escapeHtml(item.local_version || "-")} → ${escapeHtml(item.remote_version || "-")}`
        : "版本未标注";
      return `<div class="update-item" data-skill="${escapeHtml(item.name)}">
        <div class="update-item-top">
          <strong>${escapeHtml(item.name)}</strong>
          <span class="tag accent">${versionText}</span>
        </div>
        <div class="sub" style="margin:6px 0 4px;font-size:12px">${escapeHtml(label)}</div>
        <ul class="change-list">
          ${real.map(f => `<li>你的功能改动：${escapeHtml(f)}</li>`).join("")}
          ${!real.length && modified.length && !item.user_edited ? modified.map(f => `<li>官方更新文件：${escapeHtml(f)}</li>`).join("") : ""}
          ${missing.map(f => `<li>官方新增：${escapeHtml(f)}</li>`).join("")}
          ${!(real.length || modified.length || missing.length) ? `<li>${escapeHtml(label || "存在版本或内容差异")}</li>` : ""}
        </ul>
        ${notes.map(n => `<div class="sub" style="font-size:11px;margin-top:4px">• ${escapeHtml(n)}</div>`).join("")}
        ${actions ? `<div class="mini-actions">
          ${item.needs_merge ? `<button class="primary" data-merge="${escapeHtml(item.name)}">整合更新</button>` : ""}
          ${item.user_edited ? "" : `<button class="primary" data-upgrade="${escapeHtml(item.name)}">直接升级</button>`}
          ${item.user_edited ? `<button data-upgrade="${escapeHtml(item.name)}">覆盖升级</button>` : ""}
        </div>` : ""}
      </div>`;
    }

    function renderUpdateSummary(summary) {
      const official = summary?.official_updates_count ?? 0;
      const local = summary?.local_modified_count ?? 0;
      const merge = summary?.merge_needed_count ?? 0;
      return `<div class="report-summary">
        <div class="report-pill official"><span class="num">${official}</span><span class="lbl">官方版本更新</span></div>
        <div class="report-pill local"><span class="num">${local}</span><span class="lbl">仅本地改动</span></div>
        <div class="report-pill merge"><span class="num">${merge}</span><span class="lbl">建议整合</span></div>
      </div>`;
    }

    function renderUpdateReport(summary) {
      if (!summary) return `<div class="empty">没有可展示的更新结果</div>`;
      const sections = [
        ["official_updates", "官方版本更新", "版本号有变化，说明官方发布了新版本"],
        ["official_with_local_changes", "官方更新且你有功能改动", "官方有新版本，同时你确实改过功能，建议用「整合更新」"],
        ["merge_needed", "需要整合", "你改过功能，官方也更新了，建议整合保留本地定制"],
        ["remote_updates", "安装版本落后", "官方内容有变，但你没有实际功能改动，可直接升级"],
        ["local_modified", "仅你有功能改动", "主要是你本地新增/修改了功能文件"],
      ];
      const html = sections.map(([key, title, desc]) => {
        const items = summary[key] || [];
        if (!items.length) return "";
        return `<div class="update-section">
          <div class="update-section-header">
            <h4>${title}</h4>
            <span class="update-section-count">${items.length}</span>
          </div>
          <p>${desc}</p>
          ${items.map(i => renderUpdateItem(i)).join("")}
        </div>`;
      }).join("");
      return html || `<div class="empty">所有可检查 skill 都是最新，且没有待处理的本地改动。</div>`;
    }

    function bindUpdateReportActions() {
      $("updateReportBody").onclick = async (e) => {
        const mergeName = e.target.dataset.merge;
        const upgradeName = e.target.dataset.upgrade;
        if (mergeName) {
          await mergeSkill({ folder_name: mergeName, name: mergeName });
          closeModal("updateReportModal");
        }
        if (upgradeName) {
          await upgradeSkill({ folder_name: upgradeName, name: upgradeName });
          closeModal("updateReportModal");
        }
      };
    }

    async function mergeSkill(skill) {
      if (!confirm(`整合 ${skill.name}：保留你的本地改动，并合并官方最新版本？\n会先自动备份。`)) return;
      const result = await api("/api/skills/merge", "POST", { name: skill.folder_name });
      toast(`已整合 ${skill.name}，备份：${result.backup_path}`);
      state.withUpdates = true;
      await loadData();
    }

    async function upgradeSkill(skill) {
      if (!confirm(`确认将 ${skill.name} 覆盖升级到官方最新版？\n本地未备份的改动可能丢失。`)) return;
      await api("/api/skills/upgrade", "POST", { name: skill.folder_name });
      toast(`已升级 ${skill.name}`);
      state.withUpdates = true;
      await loadData();
    }

    async function toggleSkill(skill, action) {
      await api(`/api/skills/${action}`, "POST", { name: skill.folder_name });
      toast(`${action === "disable" ? "已禁用" : "已启用"} ${skill.name}`);
      await loadData();
    }

    async function batchDeleteSelected() {
      const names = [...state.selectedBatch];
      if (!names.length) { toast("请先勾选要删除的 Skill"); return; }
      if (!confirm(`确认批量删除 ${names.length} 个 Skill？`)) return;
      const result = await api("/api/skills/batch-delete", "POST", { names });
      toast(`已删除 ${result.deleted_count} 个，失败 ${result.failed_count} 个`);
      state.selectedBatch.clear();
      state.selectedId = null;
      await loadData();
    }

    async function deleteSkill(skill) {
      if (!confirm(`确认删除 ${skill.name}？\n${skill.resolved_path}`)) return;
      await api("/api/skills/delete", "POST", { resolved_path: skill.resolved_path });
      toast(`已删除 ${skill.name}`);
      state.selectedId = null;
      await loadData();
    }

    async function loadData() {
      document.body.classList.add("loading");
      const query = state.withUpdates ? "?check_updates_flag=true" : "";
      state.data = await api(`/api/scan${query}`);
      if (!state.data.skills.some(s => s.id === state.selectedId)) state.selectedId = state.data.skills[0]?.id || null;
      renderStats(); renderAgents(); renderCategoryFilters(); renderSkillList();
      const selected = state.data.skills.find(s => s.id === state.selectedId);
      await renderDetail(selected);
      document.body.classList.remove("loading");
    }

    $("searchInput").oninput = (e) => { state.search = e.target.value; renderSkillList(); };
    $("agentFilters").onclick = (e) => { const b = e.target.closest("[data-agent]"); if (!b) return; state.agent = b.dataset.agent; renderAgents(); renderSkillList(); };
    $("categoryFilters").onclick = (e) => { const b = e.target.closest("[data-category]"); if (!b) return; state.category = b.dataset.category; renderCategoryFilters(); renderSkillList(); };
    $("skillList").onclick = (e) => {
      if (e.target.matches("[data-pick]")) {
        const id = e.target.dataset.pick;
        if (e.target.checked) state.selectedBatch.add(id); else state.selectedBatch.delete(id);
        return;
      }
      const c = e.target.closest("[data-id]"); if (!c) return;
      state.selectedId = c.dataset.id; renderSkillList(); renderDetail(state.data.skills.find(s => s.id === state.selectedId));
    };
    $("refreshBtn").onclick = () => { state.withUpdates = false; loadData(); };
    $("checkUpdatesBtn").onclick = async () => {
      document.body.classList.add("loading");
      toast("正在检查远程版本...");
      state.withUpdates = true;
      await loadData();
      const summary = state.data.updates?.summary;
      const official = summary?.official_updates_count ?? 0;
      const local = summary?.local_modified_count ?? 0;
      const merge = summary?.merge_needed_count ?? 0;
      $("updateReportIntro").textContent = official || local || merge
        ? "以下 skill 需要你的关注，按优先级分类展示。"
        : "所有可检查 skill 均为最新。";
      $("updateReportSummary").innerHTML = renderUpdateSummary(summary);
      $("updateReportBody").innerHTML = renderUpdateReport(summary);
      bindUpdateReportActions();
      openModal("updateReportModal");
      toast(official || local || merge ? "检查完成，请查看更新报告" : "所有可检查 skill 均为最新");
      document.body.classList.remove("loading");
    };
    $("batchDeleteBtn").onclick = batchDeleteSelected;
    $("exportBtn").onclick = async () => {
      const blob = await fetch("/api/export?fmt=markdown").then(r => r.blob());
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = "skill-report.md"; a.click();
      URL.revokeObjectURL(url);
      toast("报告已导出");
    };
    $("createBtn").onclick = () => openModal("createModal");
    $("installBtn").onclick = () => openModal("installModal");
    document.querySelectorAll("[data-close]").forEach(el => el.onclick = () => closeModal(el.dataset.close));
    $("createSubmit").onclick = async () => {
      try {
        const result = await api("/api/skills/create", "POST", { name: $("createName").value, description: $("createDesc").value, scope: $("createScope").value });
        toast(`已创建 ${result.name}`); closeModal("createModal"); await loadData();
      } catch (err) { toast(err.message); }
    };
    $("installSubmit").onclick = async () => {
      try {
        const result = await api("/api/skills/install", "POST", {
          name: $("installName").value || null,
          scope: $("installScope").value,
          source_path: $("installPath").value || null,
          git_url: $("installGit").value || null,
          skill_subpath: $("installSubpath").value || null,
        });
        toast(`已安装 ${result.name}`); closeModal("installModal"); await loadData();
      } catch (err) { toast(err.message); }
    };
    loadData();
  </script>
</body>
</html>
